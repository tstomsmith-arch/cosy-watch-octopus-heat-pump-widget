<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Cosy Watch — Octopus Cosy Heat Pump iPhone Widget</title>

  <meta name="description" content="Cosy Watch is an unofficial Scriptable widget for Octopus Cosy heat pumps showing live status, hot water temperature, COP, energy use, Cosy Pod temperatures, humidity and fault alerts.">
  <meta property="og:title" content="Cosy Watch – Octopus Cosy Heat Pump Widget">
  <meta property="og:description" content="Monitor your Octopus Cosy heat pump from your iPhone Home Screen. Live status, COP, energy use and more.">
  <meta property="og:image" content="https://tstomsmith-arch.github.io/cosy-watch-octopus-heat-pump-widget/assets/hero-standby.jpeg">
  <meta property="og:type" content="website">
  
  <meta name="twitter:card" content="summary_large_image">
  
  <link rel="canonical" href="https://tstomsmith-arch.github.io/cosy-watch-octopus-heat-pump-widget/">

  <!-- Performance -->
  <link rel="preconnect" href="https://gc.zgo.at">

  <!-- GoatCounter -->
  <script data-goatcounter="https://cosy-watch.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico">
    <style>
    :root {
      --bg1: #10002e;
      --bg2: #22084f;
      --bg3: #3a0f6b;
      --pink: #f050f8;
      --cyan: #5ce1e6;
      --amber: #ffb020;
      --text: #ffffff;
      --muted: rgba(255,255,255,.72);
      --faint: rgba(255,255,255,.48);
      --card: rgba(255,255,255,.10);
      --border: rgba(255,255,255,.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #49136f 0, var(--bg2) 34%, var(--bg1) 100%);
      color: var(--text);
      line-height: 1.55;
    }

    a { color: inherit; }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    header { padding: 72px 0 44px; }

    .hero {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 36px;
      align-items: center;
    }

    .eyebrow {
      color: var(--cyan);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: 13px;
    }

    h1 {
      font-size: clamp(40px, 7vw, 74px);
      line-height: .95;
      margin: 12px 0 18px;
    }

    .lead {
      color: var(--muted);
      font-size: 20px;
      max-width: 650px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      display: inline-block;
      padding: 13px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }

    .btn.primary {
      background: linear-gradient(90deg, var(--pink), var(--cyan));
      color: #10002e;
    }

    .btn.secondary {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.08);
    }

    /* FIXED CLASS NAME */
    .hero-image-card {
      background: linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.05));
      border: 1px solid var(--border);
      border-radius: 34px;
      padding: 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
    }

    .hero-screenshot {
      width: 100%;
      display: block;
      border-radius: 28px;
      box-shadow: 0 18px 42px rgba(0,0,0,.28);
    }

    .gallery-screenshot {
      width: 100%;
      display: block;
      border-radius: 18px;
      margin-bottom: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
    }

    .caption {
      color: var(--faint);
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }

    section { padding: 44px 0; }

    h2 {
      font-size: clamp(28px, 4vw, 44px);
      margin: 0 0 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
    }

    .card h3 { margin-top: 0; }

    .card p, li { color: var(--muted); }

    .steps {
      counter-reset: step;
      display: grid;
      gap: 12px;
    }

    .step {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 14px;
      align-items: start;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .step:before {
      counter-increment: step;
      content: counter(step);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #10002e;
      font-weight: 800;
      background: var(--cyan);
    }

    .notice {
      border-left: 4px solid var(--amber);
      background: rgba(255,176,32,.12);
      padding: 16px 18px;
      border-radius: 14px;
      color: var(--muted);
    }

    footer {
      padding: 40px 0 60px;
      color: var(--faint);
    }

    @media (max-width: 850px) {
      header { padding-top: 42px; }
      .hero, .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
